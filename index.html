<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PayPal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f7fa;
            font-family: -apple-system, sans-serif;
        }

        /* De volledige screenshot als achtergrond */
        #appContainer {
            width: 100vw;
            height: 100vh;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* Onzichtbare knop over het pijltje linksboven */
        #navTrigger {
            position: absolute;
            top: 45px;   /* Aanpassen op basis van je screenshot */
            left: 15px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            z-index: 10;
            /* background: rgba(255,0,0,0.2);  Haal de comment weg om de knop even te zien tijdens het testen */
        }

        /* Bewerkbaar tekstveld over het bedrag */
        #balanceInput {
            position: absolute;
            top: 180px;  /* Precies op de plek van het bedrag zetten */
            left: 20px;
            width: 250px;
            font-size: 35px;
            font-weight: 600;
            color: #000;
            border: none;
            background: transparent;
            outline: none;
            letter-spacing: -1px;
        }

        /* SETTINGS OVERLAY */
        #settingsOverlay {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            transition: left 0.3s ease;
            padding: 60px 25px;
            box-sizing: border-box;
        }

        .settings-active #settingsOverlay { left: 0; }
        .close-settings { color: #003087; font-weight: 700; margin-bottom: 30px; display: block; cursor: pointer; text-decoration: none; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #666; }
        input[type="number"] { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; margin-bottom: 20px; }
        .btn-start { background: #003087; color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; font-size: 16px; }
        .btn-stop { background: #d72c0d; color: white; border: none; padding: 16px; border-radius: 30px; width: 100%; font-weight: 700; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="appContainer">
        <div id="navTrigger" onclick="openSettings()"></div>
        
        <input type="text" id="balanceInput" value="0,00 €">
    </div>

    <div id="settingsOverlay">
        <a class="close-settings" onclick="closeSettings()">← Back to App</a>
        <h2>Notificatie Controls</h2>
        
        <label>INTERVAL (SECONDEN)</label>
        <input type="number" id="pIntervalInput" value="5">

        <button class="btn-start" onclick="startPaypal()">Start Notifications</button>
        <button class="btn-stop" onclick="stopPaypal()">Stop Notifications</button>
        
        <p id="status" style="text-align:center; font-weight:bold; color:#003087; margin-top:20px;">Status: Idle</p>
    </div>

    <script>
        let pTimer = null;
        const randomNames = ["James Wilson", "Oliver Smith", "Liam Johnson", "Mason Brown", "William Jones", "Elijah Garcia", "James Miller", "Benjamin Davis", "Lucas Rodriguez", "Henry Martinez", "Alexander Hernandez", "Sebastian Lopez", "Jack Gonzalez", "Samuel Wilson", "Daniel Anderson", "Charlotte Taylor", "Amelia Thomas", "Harper Moore", "Evelyn Jackson", "Abigail Martin", "Emily Lee", "Elizabeth Perez", "Sofia Thompson", "Avery White", "Ella Harris", "Scarlett Clark", "Victoria Ramirez", "Grace Lewis", "Chloe Robinson", "Layla Walker"];

        function openSettings() { document.body.classList.add('settings-active'); }
        function closeSettings() { document.body.classList.remove('settings-active'); }

        function startPaypal() {
            if (pTimer !== null) return;
            const interval = document.getElementById('pIntervalInput').value;
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    document.getElementById('status').innerText = "Status: Actief";
                    pTimer = setInterval(sendPaypalNotification, interval * 1000);
                    sendPaypalNotification();
                }
            });
        }

        function stopPaypal() {
            clearInterval(pTimer);
            pTimer = null;
            document.getElementById('status').innerText = "Status: Gestopt";
        }

        function sendPaypalNotification() {
            const randomName = randomNames[Math.floor(Math.random() * randomNames.length)];
            const randomAmount = (Math.random() * (250 - 10) + 10).toFixed(2).replace('.', ',');
            new Notification("PayPal", {
                body: "You received €" + randomAmount + " from " + randomName,
                icon: "paypal.png"
            });
        }
    </script>
</body>
</html>
